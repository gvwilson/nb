[project]
name = "mew"
version = "0.1.0"
description = "notebook experimentation"
readme = "README.md"
requires-python = ">=3.13"
authors = [
    {name = "Greg Wilson", email = "gvwilson@third-bit.com"},
]
license = {text = "MIT"}
dependencies = [
    "anywidget>=0.9.21",
    "dagster>=1.12.17",
    "duckdb>=1.4.4",
    "jupyterlab>=4.5.4",
    "luigi>=3.7.3",
    "marimo>=0.19.9",
    "matplotlib>=3.10.8",
    "metaflow>=2.19.20",
    "numpy>=2.4.2",
    "polars>=1.38.1",
    "seaborn>=0.13.2",
    "sqlglot>=29.0.1",
    "traitlets>=5.14.3",
]

[dependency-groups]
dev = [
    "build>=1.4.0",
    "pytest>=9.0.2",
    "ruff>=0.15.0",
    "taskipy>=1.14.1",
    "twine>=6.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mew"]
artifacts = [
    "src/mew/js/*.js",
    "src/mew/js/*.js.map",
]

# For sdist, explicitly include these
[tool.hatch.build.targets.sdist]
artifacts = [
    "src/mew/js/*.js",
    "src/mew/js/*.js.map",
]

[tool.taskipy.tasks]
build = {help = "build package", cmd = """
cd js &&
npm run build &&
cd - &&
rm -rf src/mew/js &&
cp -r js/dist src/mew/js &&
python -m build
"""}
check = {help = "check code issues", cmd = "ruff check ."}
clean = {help = "clean up", cmd = """
rm -rf ./dist &&
find . -path './.venv' -prune -o -type d -name '__pycache__' -exec rm -rf {} + &&
find . -path './.venv' -prune -o -type f -name '*~' -exec rm {} +
"""}
fix = {help = "fix code issues", cmd = "ruff check --fix ."}
format = {help = "format code", cmd = "ruff format ."}
test = {help = "run tests", cmd = "pytest tests"}
